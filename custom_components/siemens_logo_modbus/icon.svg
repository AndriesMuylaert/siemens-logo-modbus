<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Device body -->
  <rect x="8" y="6" width="84" height="88" rx="6" ry="6" fill="#1a1a2e"/>
  <!-- Siemens teal accent bar at top -->
  <rect x="8" y="6" width="84" height="14" rx="6" ry="6" fill="#009999"/>
  <rect x="8" y="13" width="84" height="7" fill="#009999"/>
  <!-- Screen / display area -->
  <rect x="16" y="26" width="68" height="32" rx="3" ry="3" fill="#001a1a"/>
  <rect x="18" y="28" width="64" height="28" rx="2" ry="2" fill="#003333"/>
  <!-- Screen content: green LED-style readout lines -->
  <rect x="22" y="32" width="30" height="4" rx="1" fill="#00cc88" opacity="0.9"/>
  <rect x="22" y="39" width="20" height="4" rx="1" fill="#00cc88" opacity="0.7"/>
  <rect x="22" y="46" width="25" height="4" rx="1" fill="#00cc88" opacity="0.5"/>
  <!-- I/O terminal block indicators (bottom strip) -->
  <rect x="14" y="66" width="72" height="18" rx="2" fill="#0d0d1a"/>
  <!-- Terminal screws -->
  <circle cx="22" cy="75" r="4" fill="#2a2a3e" stroke="#009999" stroke-width="1.5"/>
  <circle cx="34" cy="75" r="4" fill="#2a2a3e" stroke="#009999" stroke-width="1.5"/>
  <circle cx="46" cy="75" r="4" fill="#2a2a3e" stroke="#009999" stroke-width="1.5"/>
  <circle cx="58" cy="75" r="4" fill="#2a2a3e" stroke="#009999" stroke-width="1.5"/>
  <circle cx="70" cy="75" r="4" fill="#2a2a3e" stroke="#009999" stroke-width="1.5"/>
  <circle cx="78" cy="75" r="4" fill="#2a2a3e" stroke="#f90" stroke-width="1.5"/>
  <!-- LED status dots -->
  <circle cx="72" cy="18" r="3" fill="#00ff88"/>
  <circle cx="82" cy="18" r="3" fill="#ff4444"/>
  <!-- LOGO text on teal bar -->
  <text x="14" y="19" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="white" letter-spacing="1">LOGO!</text>
  <!-- Bottom label -->
  <text x="50" y="96" font-family="Arial,sans-serif" font-size="6" fill="#666688" text-anchor="middle">8.4</text>
</svg>
